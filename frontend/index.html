<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinRAG</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <!-- LEFT: sidebar with chat list -->
    <aside id="sidebar">
      <div class="sidebar-head">
        <h1>FinRAG</h1>
        <button id="new-chat-btn" title="Start a new chat">+ New Query</button>
        <button id="dashboard-btn" title="Cross-document financial dashboard">📊 Dashboard</button>
      </div>
      <ul id="chat-list"><!-- chats injected by app.js --></ul>
      <div class="sidebar-foot">Local RAG · minimax-m3</div>
    </aside>

    <!-- RIGHT: the active conversation -->
    <main id="main">
      <div id="messages">
        <div class="empty-state" id="empty-state">
          ◇ Select a query or start a new one to begin.
        </div>
        <!-- message bubbles injected by app.js -->
      </div>

      <!-- Drag-and-drop overlay shown while a PDF is being dragged over the
           message pane. Pointer-events:none until .dragover is added. -->
      <div id="dropzone-overlay">
        <div class="dropzone-card">
          <div class="dropzone-icon">+</div>
          <div class="dropzone-text">Drop PDF to attach to this chat</div>
        </div>
      </div>

      <!-- Strip of attached-upload chips, rendered just above the composer
           when this chat has any uploads. Hidden when empty. -->
      <div id="attached-strip" hidden></div>

      <form id="composer" autocomplete="off">
        <select id="mode-select" title="Answer mode" disabled>
          <!-- populated by app.js from /api/modes -->
        </select>
        <!-- Hidden native file input; the visible paperclip triggers click() -->
        <input id="file-input" type="file" accept="application/pdf,.pdf" hidden />
        <button id="attach-btn" type="button"
                title="Attach a PDF to this chat" disabled>📎</button>
        <input
          id="question-input"
          type="text"
          placeholder="Query your documents..."
          disabled
        />
        <button id="send-btn" type="submit" disabled>Send</button>
      </form>
    </main>
  </div>

  <script src="/static/marked.min.js"></script>
  <!-- Plotly for the financial dashboard charts. CDN (the app already needs
       network for the Ollama cloud model); app.js degrades gracefully if it
       fails to load. -->
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <script src="/static/app.js"></script>
</body>
</html>
